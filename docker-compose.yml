version: "3.8"

services:
  backend:
    build: ./backend
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DB_PATH=/app/data/softlend.db
      - LOG_LEVEL=info
    volumes:
      - backend_data:/app/data
    healthcheck:
      test: ["CMD", "wget", "--spider", "http://localhost:3000/health"]
      interval: 15s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  rule-engine:
    build: ./rule-engine
    ports:
      - "8000:8000"
    environment:
      - RULES_PATH=/app/config/rules.yaml
    healthcheck:
      test: ["CMD", "wget", "--spider", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 3
    restart: unless-stopped

volumes:
  backend_data:
