# =============================================================================
# Softlend Rule Engine — Configuration
# =============================================================================
# Zero code changes needed to add/modify rules. Edit this file, restart.
# See README.md for operator documentation and rule structure.
# =============================================================================

# ---- Stage 1: Credit Gap Rules -------------------------------------------
# These fire when a customer's credit report has a problem.
# Each gap rule has an estimated_score_gain — the points the customer
# could recover by fixing this issue.
# ============================================================================
gap_rules:
  - id: high_utilisation
    field: credit_utilisation_pct
    operator: gt
    value: 30
    impact: high
    estimated_score_gain: 35
    action_template: "Reduce credit card utilisation from {current_value}% to below {ideal_value}%"

  - id: missed_payments
    field: missed_payments_12m
    operator: gt
    value: 0
    impact: high
    estimated_score_gain: 25
    action_template: "Clear {current_value} overdue EMI(s) to remove missed payment flag"

  - id: written_off_account
    field: written_off_accounts
    operator: gt
    value: 0
    impact: high
    estimated_score_gain: 40
    action_template: "Settle {current_value} written-off account(s) with the lender"

  - id: short_credit_age
    field: credit_age_months
    operator: lt
    value: 36
    impact: medium
    estimated_score_gain: 10
    action_template: "Avoid closing old accounts — your oldest account is only {current_value} months old"

  - id: too_many_enquiries
    field: hard_enquiries_6m
    operator: gt
    value: 3
    impact: medium
    estimated_score_gain: 10
    action_template: "Avoid applying for new credit — you have {current_value} hard enquiries in 6 months"

  - id: high_credit_utilisation_medium
    field: credit_utilisation_pct
    operator: gt
    value: 50
    impact: medium
    estimated_score_gain: 15
    action_template: "High utilisation — reduce from {current_value}% to below {ideal_value}%"

  - id: default_history
    field: default_accounts_24m
    operator: gt
    value: 0
    impact: high
    estimated_score_gain: 30
    action_template: "Settle {current_value} defaulted account(s) — this severely impacts your score"

# ---- Stage 2: Eligibility Rules -------------------------------------------
# These determine if the customer qualifies for a loan right now.
# Supports AND and OR group logic, configurable per group.
# ============================================================================

eligibility_rules:
  - name: standard_eligibility
    logic: AND
    rules:
      - id: age
        field: age
        operator: between
        min: 21
        max: 60
        weight: 0.15
        message: "Age must be between 21 and 60"

      - id: cibil_score
        field: cibil_score
        operator: gte
        value: 650
        weight: 0.30
        message: "CIBIL score must be at least 650"

      - id: foir
        field: foir
        operator: lte
        value: 0.5
        weight: 0.20
        message: "FOIR (existing EMIs ÷ income) must be 0.50 or below"

      - id: employment_type
        field: employment_type
        operator: in
        values: ["salaried", "self_employed"]
        weight: 0.10
        message: "Employment type must be salaried or self-employed"

      - id: no_written_off_accounts
        field: written_off_accounts
        operator: eq
        value: 0
        weight: 0.15
        message: "Customer must have no written-off accounts"

      - id: loan_amount_cap
        field: requested_amount
        operator: lte_multiplier
        multiplier_field: monthly_income
        multiplier: 10
        weight: 0.10
        message: "Requested amount cannot exceed 10x monthly income"

  - name: subprime_eligibility
    logic: OR
    rules:
      - id: min_income
        field: monthly_income
        operator: gte
        value: 25000
        weight: 0.40
        message: "Monthly income must be at least ₹25,000"

      - id: min_score_subprime
        field: cibil_score
        operator: gte
        value: 550
        weight: 0.60
        message: "CIBIL score must be at least 550 (subprime)"
